# Shared Postgres for every example in this directory.
#
#   docker compose up -d        # start
#   docker compose down -v      # stop and wipe
#
# Every example reads DATABASE_URL and falls back to the connection string
# below, so once this is up you can just `go run .` inside any example dir.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: runnerq
      POSTGRES_DB: runnerq
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 3s
      retries: 15

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: runnerq_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # `go build ./...` compiles every package + every `main` in examples,
      # which is the bar we already enforce locally before each commit.
      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      # gofmt check — fails the job if any tracked .go file would be
      # rewritten. Cheap and catches accidental mis-formatting before review.
      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

      # Integration tests run against the postgres service container and are
      # skipped automatically when RUNNERQ_TEST_DSN is unset (e.g. locally
      # without a database). -race is non-negotiable for an engine this
      # concurrency-heavy.
      - name: Test
        env:
          RUNNERQ_TEST_DSN: postgres://postgres:test@localhost:5432/runnerq_test
        run: go test ./... -race -count=1 -timeout=5m

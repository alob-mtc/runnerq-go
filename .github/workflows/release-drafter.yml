name: Release Drafter

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, reopened, synchronize, edited]

permissions:
  contents: read
  pull-requests: read

jobs:
  update_release_draft:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      # Re-runs on every push to main and on every PR open/edit. On main
      # pushes it (re)builds the next-version draft release. On PR events
      # it applies labels via the autolabeler config so the draft picks up
      # the right category. The draft stays unpublished until a tag is
      # pushed (see release.yml) or someone clicks Publish in the UI.
      - uses: release-drafter/release-drafter@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

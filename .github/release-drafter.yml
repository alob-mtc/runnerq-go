# Release Drafter configuration.
# Renders to a draft GitHub Release named after the next version, accumulating
# entries from merged PRs. Categories drive the section ordering; the
# autolabeler maps conventional-commit PR titles (feat/fix/perf/docs/chore/...)
# to labels. To override the auto-applied label, add the label manually on the
# PR and the autolabeler will respect the existing label.

name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

# Categories with explicit labels — first match wins. Order here is the order
# they appear in the rendered notes.
categories:
  - title: '⚠️ Breaking changes'
    labels:
      - 'breaking'
      - 'breaking-change'
  - title: '🚀 Features'
    labels:
      - 'feature'
      - 'enhancement'
  - title: '🐛 Bug fixes'
    labels:
      - 'fix'
      - 'bug'
  - title: '⚡ Performance'
    labels:
      - 'perf'
      - 'performance'
  - title: '🔒 Security'
    labels:
      - 'security'
  - title: '📚 Documentation'
    labels:
      - 'docs'
      - 'documentation'
  - title: '🧰 Maintenance'
    labels:
      - 'chore'
      - 'refactor'
      - 'ci'
      - 'build'
      - 'deps'

# Drives semver bump for $RESOLVED_VERSION. PRs labeled "breaking" bump major,
# "feature" bumps minor, everything else bumps patch.
version-resolver:
  major:
    labels:
      - 'breaking'
      - 'breaking-change'
      - 'major'
  minor:
    labels:
      - 'feature'
      - 'enhancement'
      - 'minor'
  patch:
    labels:
      - 'fix'
      - 'bug'
      - 'perf'
      - 'performance'
      - 'docs'
      - 'documentation'
      - 'chore'
      - 'refactor'
      - 'ci'
      - 'build'
      - 'deps'
      - 'security'
      - 'patch'
  default: patch

# PRs without a recognized category land here.
exclude-labels:
  - 'skip-release-notes'
  - 'duplicate'
  - 'invalid'
  - 'wontfix'

# Body template. $CHANGES is the per-category list; $CONTRIBUTORS handles
# attribution.
template: |
  $CHANGES

  ## Contributors

  $CONTRIBUTORS

change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&'

# Conventional Commit → label mapping. Title regex matches the PR title at
# event time. Includes both the bare prefix (`feat:`) and the scoped form
# (`feat(scope):`). Existing labels are preserved.
autolabeler:
  - label: 'breaking'
    title:
      - '/^[a-z]+(\(.+\))?!:/i'  # bang means breaking per Conventional Commits
    body:
      - '/BREAKING[ -]CHANGE/'
  - label: 'feature'
    title:
      - '/^feat(\(.+\))?:/i'
  - label: 'fix'
    title:
      - '/^fix(\(.+\))?:/i'
  - label: 'perf'
    title:
      - '/^perf(\(.+\))?:/i'
  - label: 'docs'
    title:
      - '/^docs?(\(.+\))?:/i'
  - label: 'security'
    title:
      - '/^security(\(.+\))?:/i'
  - label: 'refactor'
    title:
      - '/^refactor(\(.+\))?:/i'
  - label: 'ci'
    title:
      - '/^ci(\(.+\))?:/i'
  - label: 'build'
    title:
      - '/^build(\(.+\))?:/i'
  - label: 'deps'
    title:
      - '/^deps?(\(.+\))?:/i'
      - '/^chore\(deps\):/i'
  - label: 'chore'
    title:
      - '/^chore(\(.+\))?:/i'

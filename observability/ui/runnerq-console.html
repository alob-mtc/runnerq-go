function SchedulesPage({ manualTick }) {
  const [runs, setRuns] = React.useState(null);
  const [err, setErr] = React.useState(null);
  // Default to grouped (one row per schedule). Flatten = one row per run, useful
  // when the operator wants to inspect the individual firings rather than the
  // schedule-level summary. Persisted so the operator's preference survives nav.
  const [flatten, setFlatten] = useStoredBool('runnerq.schedulesFlatten', false);

  // Without per-event metadata we can't cheaply filter to "cron only" — accept
  // a refetch on any live event. Could be tightened later if SSE detail starts
  // including activity metadata.
  const liveTick = useLiveTick(null);

  React.useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        const r = await api('/cron?limit=500');
        if (cancelled) return;
        setRuns(r || []);
        setErr(null);
      } catch (e) {
        if (!cancelled) setErr(String(e));
      }
    })();
    return () => { cancelled = true; };
  }, [manualTick, liveTick]);

  // Block only on initial-load failure; keep prior data on transient errors.
  if (err && !runs) {
    return <div className="empty-state"><div className="big">Failed to load</div><div>{err}</div></div>;
  }
  if (!runs) return <div className="empty-state">Loading…</div>;

  // Group cron-tagged runs by metadata.cron_job (the README-blessed tag for
  // identifying a specific schedule) when present, falling back to
  // activity_type so existing tagging continues to group sensibly. This lets a
  // single activity_type host multiple distinct schedules without collapsing
  // them into one row.
  const scheduleKey = (r) => (r.metadata && r.metadata.cron_job) || r.activity_type;
  const groups = {};
  runs.forEach(r => {
    const k = scheduleKey(r);
    if (!groups[k]) groups[k] = { key: k, type: r.activity_type, cronJob: r.metadata && r.metadata.cron_job, latest: null, total: 0, ok: 0, err: 0, ids: [] };
    const g = groups[k];
    g.total++;
    g.ids.push(r.id);
    if (r.status === 'Completed') g.ok++;
    else if (r.status === 'Failed' || r.status === 'DeadLetter') g.err++;
    const ts = new Date(r.completed_at || r.started_at || r.created_at).getTime();
    if (!g.latest || ts > new Date(g.latest.completed_at || g.latest.started_at || g.latest.created_at).getTime()) {
      g.latest = r;
    }
  });
  const list = Object.values(groups).sort((a, b) => {
    const ta = a.latest ? new Date(a.latest.completed_at || a.latest.started_at || a.latest.created_at).getTime() : 0;
    const tb = b.latest ? new Date(b.latest.completed_at || b.latest.started_at || b.latest.created_at).getTime() : 0;
    return tb - ta;
  });

  // Flat run list — newest first by the most relevant transition timestamp.
  const flatRuns = runs.slice().sort((a, b) => {
    const ts = (r) => new Date(r.completed_at || r.started_at || r.created_at).getTime() || 0;
    return ts(b) - ts(a);
  });

  return (
    <div className="list-page">
      <div className="list-fixed">
        <div className="runs-head">
          <div>
            <h1>Schedules</h1>
            <div className="sub">
              <span>{list.length} cron schedules · {runs.length} runs in window</span>
            </div>
          </div>
        </div>
      </div>

      <div className="card runs-table-card scroll-card">
        <div className="card-head">
          <span>{flatten ? 'Cron runs (flattened)' : 'Cron-tagged activity types'}</span>
          <div className="right">
            <span style={{ fontSize: 11, color: 'var(--fg-3)', textTransform: 'none', letterSpacing: 0 }}>
              tagged via metadata.source = "cron"
            </span>
            <button
              className={'toggle-pill ' + (flatten ? 'on' : '')}
              onClick={() => setFlatten(!flatten)}
              title={flatten ? 'Showing every cron run individually — toggle to group by schedule' : 'Grouped by schedule (one row per cron_job or activity_type) — toggle to see each run'}
            >
              <span className="sw" />
              <span>Flatten</span>
            </button>
          </div>
        </div>
        <div className="table-scroll">
        {list.length === 0 ? (
          <div className="empty-state">
            <div className="big">No cron activities yet</div>
            <div>Spawn an activity with metadata source set to "cron" and it will appear here.</div>
          </div>
        ) : flatten ? (
          <table className="runs-table">
            <thead>
              <tr>
                <th>Schedule</th>
                <th style={{ width: 110 }}>Status</th>
                <th style={{ width: 200 }}>Last run</th>
                <th style={{ width: 90 }}>Attempts</th>
              </tr>
            </thead>
            <tbody>
              {flatRuns.map(r => {
                const sc = statusClass(r.status);
                const ts = r.completed_at || r.started_at || r.created_at;
                const k = scheduleKey(r);
                return (
                  <tr key={r.id} onClick={() => navTo('#/run/' + r.id)}>
                    <td>
                      <div className="id-cell">
                        <span className="typ">{k}</span>
                        <span className="uid">{r.activity_type !== k ? r.activity_type + ' · ' : ''}{r.id}</span>
                      </div>
                    </td>
                    <td><span className={'status-chip sm ' + sc}><span className="pip" />{r.status}</span></td>
                    <td>
                      <div className="ts-cell">
                        <span className="at">{fmtTsShort(ts)}</span>
                        <span className="ago">{fmtAgo(ts)}</span>
                      </div>
                    </td>
                    <td>
                      <span className={'att ' + (r.retry_count > 0 ? 'high' : '')}>
                        {r.retry_count}/{r.max_retries === 0 ? '∞' : r.max_retries}
                      </span>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        ) : (
          <table className="runs-table">
            <thead>
              <tr>
                <th>Activity type</th>
                <th style={{ width: 110 }}>Last status</th>
                <th style={{ width: 200 }}>Last run</th>
                <th style={{ width: 90 }}>Total</th>
                <th style={{ width: 90 }}>Success</th>
                <th style={{ width: 90 }}>Failures</th>
              </tr>
            </thead>
            <tbody>
              {list.map(g => {
                const sc = g.latest ? statusClass(g.latest.status) : 'pending';
                const lastTs = g.latest && (g.latest.completed_at || g.latest.started_at || g.latest.created_at);
                return (
                  <tr key={g.key} onClick={() => g.latest && navTo('#/run/' + g.latest.id)}>
                    <td>
                      <div className="id-cell">
                        <span className="typ">{g.key}</span>
                        {g.cronJob && g.cronJob !== g.type && <span className="uid">{g.type}</span>}
                      </div>
                    </td>
                    <td>
                      {g.latest ? (
                        <span className={'status-chip sm ' + sc}><span className="pip" />{g.latest.status}</span>
                      ) : <span style={{ color: 'var(--fg-3)' }}>—</span>}
                    </td>
                    <td>
                      <div className="ts-cell">
                        <span className="at">{fmtTsShort(lastTs)}</span>
                        <span className="ago">{fmtAgo(lastTs)}</span>
                      </div>
                    </td>
                    <td><span className="dur">{g.total}</span></td>
                    <td><span className="dur" style={{ color: g.ok > 0 ? 'var(--emerald)' : 'var(--fg-3)' }}>{g.ok}</span></td>
                    <td><span className="dur" style={{ color: g.err > 0 ? 'var(--red)' : 'var(--fg-3)' }}>{g.err}</span></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        )}
        </div>
      </div>
    </div>
  );
}

function App() {
  const [theme, setTheme] = useStoredTheme('dark');
  const [manualTick, setManualTick] = React.useState(0);
  const route = useHashRoute();
  const { copy, flash } = useClipboard();
  const liveStatus = useLiveStream();

  React.useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
  }, [theme]);

  const refresh = React.useCallback(() => setManualTick(t => t + 1), []);
  const toggleTheme = React.useCallback(() => setTheme(theme === 'dark' ? 'light' : 'dark'), [theme, setTheme]);

  return (
    <div className="app">
      <Sidebar active={route.name === 'schedules' ? 'schedules' : 'workflows'} />
      <div className="main">
        <TopBar theme={theme} onToggleTheme={toggleTheme} onRefresh={refresh} liveStatus={liveStatus} />
        <div className="content">
          {route.name === 'list' && <RunsListPage manualTick={manualTick} urlParams={route.params || {}} />}
          {route.name === 'run' && <RunDetailPage activityId={route.id} manualTick={manualTick} onCopy={copy} />}
          {route.name === 'schedules' && <SchedulesPage manualTick={manualTick} />}
        </div>
      </div>

      {flash && <div className="copy-flash">{flash}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
